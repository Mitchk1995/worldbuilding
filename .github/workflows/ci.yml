name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  merge_group:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Check review ledger
        run: npm run reviews:check
