name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

jobs:
  review-record:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate pull request checklist
        uses: actions/github-script@v7
        with:
          script: |
            const { loadReviewLedger, validatePullRequestGovernance } = await import(
              `file://${process.env.GITHUB_WORKSPACE}/src/pr-governance.js`
            );
            const body = context.payload.pull_request?.body ?? "";
            const ledger = loadReviewLedger(`${process.env.GITHUB_WORKSPACE}/governance/review-ledger.json`);
            const result = validatePullRequestGovernance({
              body,
              ledger,
              pullRequestHeadSha: context.payload.pull_request?.head?.sha ?? ""
            });

            if (result.errors.length > 0) {
              core.setFailed(result.errors.join("\n"));
            }
