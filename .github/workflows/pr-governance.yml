name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

jobs:
  review-record:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate pull request checklist
        uses: actions/github-script@v7
        with:
          script: |
            const {
              parsePullRequestBinding,
              validatePullRequestGovernance
            } = await import(
              `file://${process.env.GITHUB_WORKSPACE}/src/pr-governance.js`
            );
            const body = context.payload.pull_request?.body ?? "";
            const binding = parsePullRequestBinding(body);
            const response = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: "governance/review-ledger.json",
              ref: context.payload.pull_request?.head?.sha
            });
            const content = Array.isArray(response.data)
              ? null
              : Buffer.from(response.data.content, "base64").toString("utf8");
            const ledger = JSON.parse(content ?? "{}");
            const workItem = binding.workItemId
              ? (ledger.workItems ?? []).find((item) => item.id === binding.workItemId) ?? null
              : null;
            let changedPathsSinceReviewedHead = [];
            if (
              workItem?.reviewedHeadSha &&
              workItem.reviewedHeadSha !== context.payload.pull_request?.head?.sha
            ) {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${workItem.reviewedHeadSha}...${context.payload.pull_request.head.sha}`
              });
              changedPathsSinceReviewedHead = (comparison.data.files ?? []).map((file) => file.filename);
            }
            const result = validatePullRequestGovernance({
              body,
              ledger,
              pullRequestHeadSha: context.payload.pull_request?.head?.sha ?? "",
              changedPathsSinceReviewedHead
            });

            if (result.errors.length > 0) {
              core.setFailed(result.errors.join("\n"));
            }
