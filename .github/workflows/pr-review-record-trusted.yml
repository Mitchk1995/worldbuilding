name: PR Review Record Trusted

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  issue_comment:
    types:
      - created
      - edited
      - deleted

permissions:
  checks: write
  contents: read
  issues: read
  pull-requests: read

jobs:
  governance-evaluator:
    if: ${{ github.event_name == 'pull_request_target' || github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request context
        id: pull-request
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request) {
              core.setOutput("base_sha", context.payload.pull_request.base?.sha ?? "");
              core.setOutput("number", String(context.payload.pull_request.number ?? ""));
              return;
            }

            const issueNumber = context.payload.issue?.number;
            if (!issueNumber || !context.payload.issue?.pull_request) {
              core.setFailed("Could not resolve pull request context for trusted review-record validation.");
              return;
            }

            const response = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issueNumber
            });
            core.setOutput("base_sha", response.data.base?.sha ?? "");
            core.setOutput("number", String(response.data.number ?? ""));

      - name: Check out trusted governance code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pull-request.outputs.base_sha || github.event.repository.default_branch }}

      - name: Publish trusted review record check
        uses: actions/github-script@v7
        with:
          script: |
            const {
              validatePullRequestGovernance
            } = await import(
              `file://${process.env.GITHUB_WORKSPACE}/src/pr-governance.js`
            );
            const {
              findLatestReviewEvidenceComment,
              loadReviewEvidencePolicy,
              parseReviewEvidenceComment
            } = await import(
              `file://${process.env.GITHUB_WORKSPACE}/src/pr-review-evidence.js`
            );
            const path = await import("node:path");
            const checkName = "review-record-trusted";
            const githubActionsAppId = 15368;

            async function loadPullRequest() {
              const pullNumber = Number.parseInt("${{ steps.pull-request.outputs.number }}", 10);
              if (!pullNumber) {
                return null;
              }

              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber
              });
              return response.data;
            }

            async function upsertReviewRecordCheck({ headSha, conclusion, summary, text }) {
              const existingRuns = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                check_name: checkName,
                per_page: 100
              });
              const existing = (existingRuns.data.check_runs ?? []).find(
                (run) => run.app?.id === githubActionsAppId && run.name === checkName
              );
              const output = {
                title: "Trusted PR Governance",
                summary,
                text
              };

              if (existing) {
                await github.rest.checks.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  check_run_id: existing.id,
                  status: "completed",
                  conclusion,
                  output
                });
                return;
              }

              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: checkName,
                head_sha: headSha,
                status: "completed",
                conclusion,
                output
              });
            }

            const pullRequest = await loadPullRequest();
            if (!pullRequest) {
              core.setFailed("Could not resolve pull request context for trusted review-record validation.");
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              per_page: 100
            });
            const reviewEvidencePolicy = loadReviewEvidencePolicy(
              path.resolve(process.env.GITHUB_WORKSPACE, "governance", "review-evidence-policy.json")
            );
            const evidenceComment = findLatestReviewEvidenceComment(comments, reviewEvidencePolicy);
            const result = validatePullRequestGovernance({
              body: pullRequest.body ?? "",
              pullRequestHeadSha: pullRequest.head?.sha ?? "",
              reviewEvidence: parseReviewEvidenceComment(evidenceComment?.body ?? "")
            });

            if (result.errors.length > 0) {
              await upsertReviewRecordCheck({
                headSha: pullRequest.head?.sha ?? context.sha,
                conclusion: "failure",
                summary: `Trusted governance failed for ${result.binding.workItemId ?? "undeclared work item"}.`,
                text: result.errors.join("\n")
              });
              core.setFailed(result.errors.join("\n"));
              return;
            }

            await upsertReviewRecordCheck({
              headSha: pullRequest.head?.sha ?? context.sha,
              conclusion: "success",
              summary: `Trusted governance matches work item ${result.binding.workItemId} round ${result.binding.reviewRound}.`,
              text: `Trusted review evidence matches PR head ${pullRequest.head?.sha ?? "unknown"}.`
            });
